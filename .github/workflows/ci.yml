name: CI/CD - MicroSayur

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ============================================================
  # Job 1: Test & Lint - User Service
  # ============================================================
  test-user-service:
    name: 🧪 Test User Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./user-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download Go dependencies
        run: go mod download

      - name: Build User Service
        run: go build ./...

      - name: Run Go Vet
        run: go vet ./...

  # ============================================================
  # Job 2: Test & Lint - Product Service
  # ============================================================
  test-product-service:
    name: 🧪 Test Product Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./product-service
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download Go dependencies
        run: go mod download

      - name: Build Product Service
        run: go build ./...

      - name: Run Go Vet
        run: go vet ./...

  # ============================================================
  # Job 3: Build - Nuxt Frontend
  # ============================================================
  build-frontend:
    name: 🏗️ Build Nuxt Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./nuxt-frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: nuxt-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Nuxt application
        run: npm run build
        env:
          # Dummy values for build-time validation
          NUXT_PUBLIC_API_BASE: http://localhost:8081/api/v1
          NUXT_PUBLIC_USER_API_BASE: http://localhost:8085

  # ============================================================
  # Job 4: Build & Push Docker Images (only on push to main)
  # ============================================================
  docker-build-push:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: [test-user-service, test-product-service, build-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push User Service
        uses: docker/build-push-action@v5
        with:
          context: ./user-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/microsayur-user-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Product Service
        uses: docker/build-push-action@v5
        with:
          context: ./product-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/microsayur-product-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./nuxt-frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/microsayur-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
